<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="PECHUNIA logo">
  <defs>
    <clipPath id="circleClip">
      <circle cx="120" cy="120" r="108"/>
    </clipPath>
  </defs>

  <!-- Outer curved text -->
  <g fill="#7e8a96" font-family="Montserrat, 'Noto Sans JP', sans-serif" font-size="11" letter-spacing="2">
    <path id="topArc" d="M 32 120 A 88 88 0 0 1 208 120" fill="none"/>
    <path id="botArc" d="M 32 120 A 88 88 0 0 0 208 120" fill="none"/>
  </g>

  <!-- Pale blue background circle -->
  <circle cx="120" cy="120" r="92" fill="#cfe3ee" stroke="#9bb6c4" stroke-width="1.2"/>

  <g clip-path="url(#circleClip)">
    <!-- Leaf -->
    <g transform="translate(40 130) rotate(-15)">
      <path d="M 0 0 C 8 -28 38 -36 60 -22 C 50 -2 22 6 0 0 Z"
            fill="#a4b2bd" stroke="#7c8a96" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M 5 -2 C 22 -16 42 -20 56 -18" fill="none" stroke="#7c8a96" stroke-width="1" opacity="0.6"/>
      <path d="M -10 4 L 50 -8" stroke="#7c8a96" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Flower petals (back gray) -->
    <g transform="translate(120 110)">
      <!-- Back gray petals -->
      <path d="M -54 -18 C -64 -42 -42 -64 -18 -56 C -10 -36 -28 -14 -54 -18 Z"
            fill="#a4b2bd" stroke="#7c8a96" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M 26 -52 C 42 -68 70 -56 72 -32 C 56 -22 32 -34 26 -52 Z"
            fill="#a4b2bd" stroke="#7c8a96" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M -16 36 C -36 44 -56 26 -50 4 C -28 0 -10 18 -16 36 Z"
            fill="#a4b2bd" stroke="#7c8a96" stroke-width="1.5" stroke-linejoin="round"/>

      <!-- Front white petals -->
      <path d="M 4 -56 C -16 -78 16 -94 36 -82 C 44 -64 24 -46 4 -56 Z"
            fill="#ffffff" stroke="#7c8a96" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M 50 -22 C 76 -22 78 12 56 24 C 38 16 32 -14 50 -22 Z"
            fill="#ffffff" stroke="#7c8a96" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M 22 22 C 36 46 8 64 -14 50 C -16 30 4 14 22 22 Z"
            fill="#ffffff" stroke="#7c8a96" stroke-width="1.5" stroke-linejoin="round"/>
    </g>

    <!-- Bubbles -->
    <g fill="#ffffff" stroke="#7c8a96" stroke-width="1">
      <circle cx="200" cy="118" r="6"/>
      <circle cx="208" cy="100" r="3"/>
    </g>
    <g fill="#a4b2bd" stroke="#7c8a96" stroke-width="1">
      <circle cx="194" cy="138" r="4"/>
    </g>
  </g>

  <!-- Brand text -->
  <text x="120" y="178" text-anchor="middle"
        font-family="Montserrat, 'Noto Sans JP', sans-serif"
        font-weight="600" font-size="22" letter-spacing="2" fill="#7e8a96">PECHUNIA</text>
</svg>
